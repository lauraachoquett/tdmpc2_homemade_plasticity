# environment
task: cartpole-swingup
modality: 'state'
action_repeat: ???
device: mps
discount: 0.99
episode_length: 1000/${action_repeat}
train_steps: 500000/${action_repeat}

# planning (TD-MPC2 Style)
iterations: 6
num_samples: 512
num_elites: 64
num_pi_trajs: 24
min_std: 0.05
max_std: 2
temperature: 0.5
momentum: 0.0 # Désactivé

# learning (TD-MPC2 Style)
batch_size: 512
max_buffer_size: 1000000
horizon: 5
reward_coef: 0.5
value_coef: 0.1
consistency_coef: 2
rho: 0.5
lr: 1e-3
kappa: 0.1
per_alpha: 0.6
per_beta: 0.4
entropy_coef: 1e-4 # Nouveau : MaxEnt RL
num_q: 5           # Nouveau : Ensemble
dropout: 0.01      # Nouveau : Stabilité Q
std_schedule: linear(0.5, ${min_std}, 25000)
horizon_schedule: linear(1, ${horizon}, 25000)
grad_clip_norm: 20
seed_steps: 500
update_freq: 2
tau: 0.01
enc_lr_scale: 0.1



# architecture
enc_dim: 256
mlp_dim: 512
latent_dim: 50
simnorm_dim: 10

# wandb (insert your own)
use_wandb: false
wandb_project: none
wandb_entity: none

# misc
seed: 1
exp_name: default_mps
eval_freq: 20000
eval_episodes: 10
save_video: false
save_model: false
